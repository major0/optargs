name: Lint

on:
  workflow_call:
    inputs:
      directory:
        description: 'Module directory relative to repo root'
        required: false
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.4
        working-directory: ${{ inputs.directory }}
        args: --config ${{ github.workspace }}/.golangci.yml
