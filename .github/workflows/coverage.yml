name: Test Coverage Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  coverage-optargs:
    name: OptArgs Core Coverage
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.optargs-changed == 'true'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - run: sudo apt-get update && sudo apt-get install -y bc
    - run: make coverage
    - run: make coverage-report
    - run: make coverage-validate
    - uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: optargs-core
        name: optargs-core-coverage
        fail_ci_if_error: false
    - uses: actions/upload-artifact@v4
      with:
        name: optargs-coverage-reports
        path: |
          coverage.out
          coverage.html
          coverage_analysis.md
          coverage_gaps_detailed.md
        retention-days: 30

  coverage-goarg:
    name: GoArg Module Coverage
    needs: [detect-changes, coverage-optargs]
    if: always() && needs.detect-changes.outputs.goarg-changed == 'true'
    uses: ./.github/workflows/module-coverage.yml
    with:
      directory: goarg
      artifact-name: goarg-coverage-reports
      codecov-flags: goarg-module

  coverage-pflags:
    name: PFlags Module Coverage
    needs: [detect-changes, coverage-optargs]
    if: always() && needs.detect-changes.outputs.pflags-changed == 'true'
    uses: ./.github/workflows/module-coverage.yml
    with:
      directory: pflags
      artifact-name: pflags-coverage-reports
      codecov-flags: pflags-module

  coverage-summary:
    name: Combined Coverage Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, coverage-optargs, coverage-goarg, coverage-pflags]
    if: always()
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - uses: actions/download-artifact@v4
      with:
        path: coverage-artifacts
    - name: Generate combined coverage summary
      run: .github/scripts/coverage-summary.sh coverage-artifacts
    - name: Comment coverage summary on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        script: |
          const fs = require('fs');
          let coverageSummary = '';
          try {
            coverageSummary = fs.readFileSync('coverage-summary.md', 'utf8');
          } catch (error) {
            console.log('Coverage summary file not found');
            return;
          }
          const commentBody = `## Multi-Module Test Coverage Report\n\n${coverageSummary}`;
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
          } catch (error) {
            console.log('Failed to post coverage comment:', error.message);
          }

  coverage-regression:
    name: Coverage Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - run: sudo apt-get update && sudo apt-get install -y bc
    - name: Generate PR coverage
      run: |
        make coverage
        echo "PR_COVERAGE=$(.github/scripts/coverage-extract.sh coverage.out)" >> "$GITHUB_ENV"
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
    - name: Generate main coverage
      run: |
        if make coverage 2>/dev/null; then
          echo "MAIN_COVERAGE=$(.github/scripts/coverage-extract.sh coverage.out)" >> "$GITHUB_ENV"
        else
          echo "MAIN_COVERAGE=0" >> "$GITHUB_ENV"
          echo "SKIP_REGRESSION=true" >> "$GITHUB_ENV"
        fi
    - name: Check for coverage regression
      run: .github/scripts/coverage-regression.sh
