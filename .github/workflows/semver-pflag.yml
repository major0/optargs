name: Semver PFlag

on:
  create:
  push:
    branches:
      - 'pflag/v[0-9]+.[0-9]+'
    paths:
      - 'pflag/**'

jobs:
  semver:
    uses: ./.github/workflows/semver.yml
    permissions:
      contents: write
    with:
      prefix: 'pflag/v'
      ref-pattern: 'refs/heads/pflag/v'

  release:
    needs: semver
    if: needs.semver.outputs.tag != ''
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.semver.outputs.tag }}
