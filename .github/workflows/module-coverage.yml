name: Module Coverage

on:
  workflow_call:
    inputs:
      directory:
        description: 'Module directory relative to repo root (empty for root)'
        required: false
        type: string
        default: ''
      artifact-name:
        description: 'Name for the coverage artifact'
        required: true
        type: string
      codecov-flags:
        description: 'Codecov flag name'
        required: true
        type: string

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - name: Run tests with coverage
      run: .github/scripts/module-coverage.sh "${{ inputs.directory || '.' }}"
    - uses: codecov/codecov-action@v4
      with:
        file: ./${{ inputs.directory && format('{0}/', inputs.directory) || '' }}coverage.out
        flags: ${{ inputs.codecov-flags }}
        name: ${{ inputs.artifact-name }}
        fail_ci_if_error: false
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.directory && format('{0}/', inputs.directory) || '' }}coverage.out
          ${{ inputs.directory && format('{0}/', inputs.directory) || '' }}coverage.html
        retention-days: 30
