name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'goarg/v[0-9]+.[0-9]+.[0-9]+*'
      - 'pflags/v[0-9]+.[0-9]+.[0-9]+*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. "v0.4.0-rc1", "goarg/v0.3.0")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      # Resolve the tag: workflow_call passes it as input, tag-push has it in GITHUB_REF.
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Ensure annotated tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/release-ensure-annotated.sh "$RELEASE_TAG"

      - name: Determine tag series
        id: series
        run: .github/scripts/release-detect-series.sh "$RELEASE_TAG"

      - name: Find previous tag in series
        id: prev
        run: >-
          .github/scripts/release-find-previous.sh
          "${{ steps.series.outputs.tag }}"
          "${{ steps.series.outputs.prefix }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          .github/scripts/release-create.sh
          "${{ steps.series.outputs.tag }}"
          "${{ steps.series.outputs.name }}"
          "${{ steps.prev.outputs.tag }}"
