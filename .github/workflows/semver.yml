name: Semver

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Tag/release prefix (e.g. "v", "goarg/v", "pflags/v")'
        required: true
        type: string
      ref-pattern:
        description: 'Ref prefix for create event filtering (e.g. "refs/heads/v", "refs/heads/goarg/v")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  semver:
    name: Auto-tag
    if: github.event_name == 'push' || (github.event_name == 'create' && startsWith(github.ref, inputs.ref-pattern))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Semantic Versioning
        id: semver
        uses: major0/semver-release-action@v1
        with:
          release-prefix: ${{ inputs.prefix }}
          tag-prefix: ${{ inputs.prefix }}
      - name: Summary
        if: steps.semver.outputs.tag != ''
        run: .github/scripts/semver-summary.sh "${{ steps.semver.outputs.tag }}" "${{ steps.semver.outputs.tag-type }}"
