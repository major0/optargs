name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  lint-optargs:
    name: Lint OptArgs Core
    needs: detect-changes
    if: needs.detect-changes.outputs.optargs-changed == 'true'
    uses: ./.github/workflows/lint.yaml

  lint-goarg:
    name: Lint GoArg
    needs: detect-changes
    if: needs.detect-changes.outputs.goarg-changed == 'true'
    uses: ./.github/workflows/lint.yaml
    with:
      directory: goarg

  lint-pflag:
    name: Lint PFlag
    needs: detect-changes
    if: needs.detect-changes.outputs.pflag-changed == 'true'
    uses: ./.github/workflows/lint.yaml
    with:
      directory: pflag

  build-optargs:
    name: Build OptArgs Core
    needs: detect-changes
    if: needs.detect-changes.outputs.optargs-changed == 'true'
    uses: ./.github/workflows/build-module.yml

  build-goarg:
    name: Build GoArg Module
    needs: [detect-changes, build-optargs]
    if: always() && needs.detect-changes.outputs.goarg-changed == 'true'
    uses: ./.github/workflows/build-module.yml
    with:
      directory: goarg

  build-pflag:
    name: Build PFlag Module
    needs: [detect-changes, build-optargs]
    if: always() && needs.detect-changes.outputs.pflag-changed == 'true'
    uses: ./.github/workflows/build-module.yml
    with:
      directory: pflag

  compat-test:
    name: Compatibility Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, build-goarg, build-pflag]
    if: always() && (needs.detect-changes.outputs.goarg-changed == 'true' || needs.detect-changes.outputs.pflag-changed == 'true')
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - name: goarg compat-test
      if: needs.detect-changes.outputs.goarg-changed == 'true'
      working-directory: goarg
      run: make compat-test
    - name: pflag compat-test
      if: needs.detect-changes.outputs.pflag-changed == 'true'
      working-directory: pflag
      run: make compat-test
    - name: Verify golden files present
      run: .github/scripts/compat-golden-count.sh
