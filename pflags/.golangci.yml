version: 2

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln

  gocyclo:
    min-complexity: 15

  goimports:
    local-prefixes: github.com/major0/optargs/pflags

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

  lll:
    line-length: 140

  misspell:
    locale: US

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

issues:
  exclude-dirs:
    - vendor
    - .git
    - compat
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
